<div
  class="sls-track"
  role="tablist"
  [attr.aria-label]="'Segmented control'"
  [class.sls-track--blue]="tint() === 'blue'"
  [class.sls-track--yellow]="tint() === 'yellow'"
  [class.sls-track--violet]="tint() === 'violet'"
  [class.sls-track--cyan]="tint() === 'cyan'"
>
  <!-- 液态玻璃滑块 -->
  <div
    class="sls-slider"
    [style.left.px]="sliderLeft()"
    [style.width.px]="sliderWidth()"
  ></div>

  <!-- 选项按钮 -->
  @for (option of options(); track option; let i = $index) {
    <button
      class="sls-option"
      [class.sls-option--active]="i === selectedIndex()"
      type="button"
      role="tab"
      [attr.aria-selected]="i === selectedIndex()"
      [attr.aria-controls]="'panel-' + i"
      (click)="onSelect(i)"
    >
      {{ option }}
    </button>
  }
</div>
