<div class="contact-terminal-dialog">
  <header class="contact-terminal-dialog__bar">
    <div class="contact-terminal-dialog__traffic">
      <span class="is-red" (click)="close()"></span>
      <span class="is-yellow"></span>
      <span class="is-green"></span>
    </div>
    <div class="contact-terminal-dialog__title">contact &#64;spacelab: ~/profile</div>
    <button type="button" class="contact-terminal-dialog__close" aria-label="Close" (click)="close()">
      &times;
    </button>
  </header>

  <main class="contact-terminal-dialog__body">
    <p class="terminal-line">$ cat contact-info.txt</p>
    <p class="terminal-ok">[OK] {{ t('about.contactDialogSubtitle') }}</p>

    <div class="contact-terminal-dialog__rows">
      <div class="contact-row">
        <span>{{ t('about.github') }}</span>
        <strong>{{ githubUser }}</strong>
      </div>
      <div class="contact-row">
        <span>{{ t('about.email') }}</span>
        <strong>{{ email }}</strong>
      </div>
    </div>

    <div class="contact-terminal-dialog__actions">
      <a mat-flat-button class="action-btn action-btn--primary" [href]="github" target="_blank" rel="noopener noreferrer">
        {{ t('about.openGithub') }}
      </a>
      <button mat-stroked-button class="action-btn" type="button" (click)="copyEmail()">
        {{ t('about.copyEmail') }}
      </button>
      <button mat-stroked-button class="action-btn" type="button" (click)="sendEmail()">
        {{ t('about.sendEmail') }}
      </button>
    </div>
  </main>
</div>
