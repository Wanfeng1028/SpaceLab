<nav class="navbar"
     [class.is-scrolled]="isScrolled()"
     [class.is-hidden]="isHidden()"
     [class.mobile-open]="mobileMenuOpen()">

  <!-- Logo / Site Name -->
  <a class="navbar__brand" routerLink="/">
    <span class="navbar__logo">✦</span>
    <span class="navbar__name">SpaceLab</span>
  </a>

  <!-- Desktop Nav Links -->
  <div class="navbar__links" [class.is-open]="mobileMenuOpen()">
    @for (link of navLinks; track link.route) {
      <a class="navbar__link"
         [routerLink]="link.route"
         routerLinkActive="is-active"
         (click)="closeMobileMenu()">
        {{ t(link.labelKey) }}
      </a>
    }

    <!-- i18n Toggle -->
    <button class="navbar__lang-toggle" (click)="toggleLang()" [attr.aria-label]="'Toggle language'">
      {{ currentLang() === 'zh-CN' ? 'EN' : '中' }}
    </button>
  </div>

  <!-- Mobile Menu Toggle -->
  <button class="navbar__hamburger" (click)="toggleMobileMenu()" [attr.aria-label]="'Toggle menu'">
    <span class="hamburger-line" [class.is-open]="mobileMenuOpen()"></span>
    <span class="hamburger-line" [class.is-open]="mobileMenuOpen()"></span>
    <span class="hamburger-line" [class.is-open]="mobileMenuOpen()"></span>
  </button>
</nav>

<!-- Mobile Overlay -->
@if (mobileMenuOpen()) {
  <div class="navbar__overlay" (click)="closeMobileMenu()"></div>
}
