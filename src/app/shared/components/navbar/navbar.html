<nav class="navbar"
     [class.is-scrolled]="isScrolled()"
     [class.mobile-open]="mobileMenuOpen()">

  <!-- Logo / Site Name -->
  <div class="navbar__brand">
    <a class="navbar__brand-logo" routerLink="/">
      <span class="navbar__logo">✦</span>
      <span class="navbar__name">SpaceLab</span>
    </a>
    <a class="navbar__avatar-link" routerLink="/">
      <div class="avatar-spinner">
        <div class="avatar-spinner__ring"></div>
        <img class="navbar__avatar" src="touxiang.png" alt="avatar" />
      </div>
    </a>
  </div>

  <!-- Desktop Nav Links -->
  <div class="navbar__links" [class.is-open]="mobileMenuOpen()">

    <!-- Share Tooltip (紧挨头像) -->
    <div class="share-tooltip-container">
      <div class="share-button-content" (click)="onShare()">
        <span class="share-text">{{ t('common.share') }}</span>

        <div class="social-icons">

              <path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/>
            </svg>
          </a>
          <a [href]="shareFacebookUrl()" target="_blank" rel="noopener" class="social-icon social-icon--facebook">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20">
              <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
            </svg>
          </a>
          <a [href]="shareLinkedinUrl()" target="_blank" rel="noopener" class="social-icon social-icon--linkedin">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20">
              <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
            </svg>
          </a>
        </div>
      </div>
    </div>

        <svg class="github-star-btn__star" viewBox="0 0 24 24" fill="currentColor">
          <path clip-rule="evenodd" d="M10.788 3.21c.448-1.077 1.976-1.077 2.424 0l2.082 5.006 5.404.434c1.164.093 1.636 1.545.749 2.305l-4.117 3.527 1.257 5.273c.271 1.136-.964 2.033-1.96 1.425L12 18.354 7.373 21.18c-.996.608-2.231-.29-1.96-1.425l1.257-5.273-4.117-3.527c-.887-.76-.415-2.212.749-2.305l5.404-.434 2.082-5.005Z" fill-rule="evenodd"/>

         (click)="closeMobileMenu()">
        <div class="sparkle-btn__dots"></div>
        <svg class="sparkle-btn__sparkle" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">

            (click)="toggleLang(); closeMobileMenu()"
            [attr.aria-label]="'Toggle language'">

      <svg class="sparkle-btn__sparkle" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">

      <span class="sparkle-btn__text">{{ currentLang() === 'zh-CN' ? 'EN' : '中' }}</span>
    </button>
  </div>

  <!-- Mobile Menu Toggle -->
  <button class="navbar__hamburger" (click)="toggleMobileMenu()" [attr.aria-label]="'Toggle menu'">
    <span class="hamburger-line" [class.is-open]="mobileMenuOpen()"></span>
    <span class="hamburger-line" [class.is-open]="mobileMenuOpen()"></span>
    <span class="hamburger-line" [class.is-open]="mobileMenuOpen()"></span>
  </button>
</nav>

<!-- Mobile Overlay -->
@if (mobileMenuOpen()) {
  <div class="navbar__overlay" (click)="closeMobileMenu()"></div>
}

<!-- Share Modal -->
@if (showShareModal()) {
  <space-glass-modal size="sm" (closed)="showShareModal.set(false)">
    <div modalBadge>
      <span class="share-badge">{{ t('common.copyLinkBadge') }}</span>
    </div>
    <div class="share-modal-body">
      <p class="share-modal-text">{{ t('common.copyLinkMsg') }}</p>
      <div class="share-modal-url">{{ currentUrl }}</div>
    </div>
  </space-glass-modal>
}
