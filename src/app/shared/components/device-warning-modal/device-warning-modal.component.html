@if (visible()) {
  <div class="device-warning-overlay" (click)="onClose()">
    <div class="device-warning-card" (click)="$event.stopPropagation()">
      <div class="warning-icon">⚠️</div>
      <h3 class="warning-title">设备性能不足</h3>
      <p class="warning-desc">
        当前设备可能无法流畅运行 TesoroHome 3D 体验。<br />
        为了避免卡顿、发热或页面崩溃，建议使用性能更好的电脑访问。
      </p>
      <button class="warning-btn" type="button" (click)="onClose()">知道了</button>
    </div>
  </div>
}
