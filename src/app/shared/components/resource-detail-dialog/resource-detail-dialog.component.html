<div class="rd">
  <header class="rd__header">
    <span class="rd__badge" [attr.data-category]="data.category">{{ data.categoryLabel }}</span>
    @if (data.date) {
      <span class="rd__date">{{ data.date }}</span>
    }
  </header>

  <h2 class="rd__title">{{ data.title }}</h2>

  <p class="rd__summary">{{ data.summary }}</p>

  <mat-divider class="rd__divider" />

  <div class="rd__meta">
    <mat-icon class="rd__meta-icon">source</mat-icon>
    <span class="rd__source">{{ data.source }}</span>
  </div>

  @if (data.tags.length > 0) {
    <mat-chip-set class="rd__tags">
      @for (tag of data.tags; track tag) {
        <mat-chip class="rd__tag">{{ tag }}</mat-chip>
      }
    </mat-chip-set>
  }

  <footer class="rd__footer">
    <button mat-stroked-button class="rd__btn rd__btn--primary" (click)="openUrl()">
      {{ t('resourceInbox.viewSource') }}
      <mat-icon>open_in_new</mat-icon>
    </button>
    <button mat-button class="rd__btn" (click)="close()">{{ t('resourceInbox.close') }}</button>
  </footer>
</div>
