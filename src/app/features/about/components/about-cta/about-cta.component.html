<section class="cta">
  <div class="cta__card">
    <span class="cta__icon">🚀</span>
    <h2 class="cta__title">{{ t('about.cta.title') }}</h2>
    <p class="cta__desc">{{ t('about.cta.desc') }}</p>
    <div class="cta__actions">
      <button class="btn btn--primary" type="button" (click)="openContact()">
        <svg
          class="btn__icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <rect x="2" y="4" width="20" height="16" rx="2" />
          <path d="M22 7l-10 7L2 7" />
        </svg>
        {{ t('about.cta.contactMe') }}
      </button>
      <a class="btn btn--secondary" routerLink="/">
        <svg
          class="btn__icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        {{ t('about.cta.backHome') }}
      </a>
    </div>
  </div>
</section>
