<div class="dashboard">
  <h2 class="dashboard__title">仪表盘</h2>

  <nz-row [nzGutter]="[16, 16]">
    <nz-col [nzXs]="12" [nzSm]="12" [nzMd]="6">
      <nz-card>
        <nz-statistic [nzValue]="postStats().totalPosts" nzTitle="文章总数"></nz-statistic>
      </nz-card>
    </nz-col>
    <nz-col [nzXs]="12" [nzSm]="12" [nzMd]="6">
      <nz-card>
        <nz-statistic [nzValue]="postStats().publishedPosts" nzTitle="已发布"></nz-statistic>
      </nz-card>
    </nz-col>
    <nz-col [nzXs]="12" [nzSm]="12" [nzMd]="6">
      <nz-card>
        <nz-statistic [nzValue]="postStats().draftPosts" nzTitle="草稿"></nz-statistic>
      </nz-card>
    </nz-col>
    <nz-col [nzXs]="12" [nzSm]="12" [nzMd]="6">
      <nz-card>
        <nz-statistic [nzValue]="postStats().totalViews" nzTitle="总阅读量"></nz-statistic>
      </nz-card>
    </nz-col>
  </nz-row>

  <nz-row [nzGutter]="[16, 16]" class="dashboard__row">
    <nz-col [nzXs]="12" [nzSm]="12" [nzMd]="6">
      <nz-card>
        <nz-statistic [nzValue]="userStats().total_users" nzTitle="用户总数"></nz-statistic>
      </nz-card>
    </nz-col>
    <nz-col [nzXs]="12" [nzSm]="12" [nzMd]="6">
      <nz-card>
        <nz-statistic [nzValue]="userStats().active_users" nzTitle="活跃用户"></nz-statistic>
      </nz-card>
    </nz-col>
    <nz-col [nzXs]="12" [nzSm]="12" [nzMd]="6">
      <nz-card>
        <nz-statistic [nzValue]="userStats().banned_users" nzTitle="封禁用户"></nz-statistic>
      </nz-card>
    </nz-col>
    <nz-col [nzXs]="12" [nzSm]="12" [nzMd]="6">
      <nz-card>
        <nz-statistic [nzValue]="userStats().recent_users" nzTitle="近7天新增"></nz-statistic>
      </nz-card>
    </nz-col>
  </nz-row>

  <div class="dashboard__shortcuts">
    <nz-card nzTitle="快捷操作">
      <button nz-button nzType="primary" routerLink="/admin/write">
        <span nz-icon nzType="plus"></span>
        写文章
      </button>
      <button nz-button routerLink="/admin/posts">
        <span nz-icon nzType="file-text"></span>
        管理文章
      </button>
      <button nz-button routerLink="/admin/users">
        <span nz-icon nzType="team"></span>
        管理用户
      </button>
      <button nz-button routerLink="/admin/comments">
        <span nz-icon nzType="message"></span>
        评论审核
      </button>
      <button nz-button routerLink="/admin/analytics">
        <span nz-icon nzType="bar-chart"></span>
        数据分析
      </button>
    </nz-card>
  </div>

  <!-- 系统状态 -->
  <nz-row [nzGutter]="[16, 16]" class="dashboard__row">
    <nz-col [nzSpan]="24">
      <nz-card nzTitle="系统状态">
        <div class="health-grid">
          <div class="health-item">
            <span class="health-label">API</span>
            <span class="health-dot" [class.health-dot--ok]="health()?.status === 'healthy'" [class.health-dot--err]="health()?.status !== 'healthy'"></span>
            <span class="health-value">{{ health()?.status || '检查中...' }}</span>
          </div>
          <div class="health-item">
            <span class="health-label">数据库</span>
            <span class="health-dot" [class.health-dot--ok]="health()?.checks?.database === 'healthy'" [class.health-dot--err]="health()?.checks?.database?.startsWith('error')"></span>
            <span class="health-value">{{ health()?.checks?.database || '检查中...' }}</span>
          </div>
          <div class="health-item">
            <span class="health-label">Redis</span>
            <span class="health-dot" [class.health-dot--ok]="health()?.checks?.redis === 'healthy'" [class.health-dot--na]="health()?.checks?.redis === 'not configured'"></span>
            <span class="health-value">{{ health()?.checks?.redis || '检查中...' }}</span>
          </div>
        </div>
      </nz-card>
    </nz-col>
  </nz-row>
</div>
