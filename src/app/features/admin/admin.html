<div class="admin-page">
  <div class="container">
    <div class="admin-header">
      <h1 class="admin-header__title">{{ t('admin.newArticle') }}</h1>
      <div class="space-button-group admin-header__actions">
        <button class="space-button space-button--sm space-button--white" (click)="togglePreview()">
          {{ isPreview() ? t('admin.editor') : t('admin.preview') }}
        </button>
        <button class="space-button space-button--sm space-button--white" (click)="onSaveDraft()">
          {{ t('admin.saveDraft') }}
        </button>
        <button class="space-button space-button--sm space-button--blue" (click)="onPublish()">
          {{ t('admin.publish') }}
        </button>
      </div>
    </div>

    @if (!isPreview()) {
      <!-- Editor Mode -->
      <div class="editor-form">
        <div class="form-field">
          <label class="form-label">{{ t('admin.title') }}</label>
          <input
            class="form-input"
            type="text"
            [value]="title()"
            (input)="title.set($any($event.target).value)"
            placeholder="{{ t('admin.titlePlaceholder') }}"
          />
        </div>

        <div class="form-field">
          <label class="form-label">{{ t('admin.tags') }}</label>
          <input
            class="form-input"
            type="text"
            [value]="tags()"
            (input)="tags.set($any($event.target).value)"
            placeholder="{{ t('admin.tagsPlaceholder') }}"
          />
        </div>

        <div class="form-field">
          <label class="form-label">{{ t('admin.category') }}</label>
          <select
            class="form-select"
            [value]="category()"
            (change)="category.set($any($event.target).value)"
          >
            <option value="GIS">{{ t('admin.catGis') }}</option>
            <option value="开发">{{ t('admin.catDev') }}</option>
            <option value="算法">{{ t('admin.catAlgorithm') }}</option>
            <option value="随笔">{{ t('admin.catEssay') }}</option>
            <option value="薅羊毛攻略">{{ t('admin.catDeals') }}</option>
          </select>
        </div>

        <div class="form-field">
          <label class="form-label">{{ t('admin.content') }}</label>
          <textarea
            class="form-textarea"
            [value]="content()"
            (input)="content.set($any($event.target).value)"
            placeholder="{{ t('admin.contentPlaceholder') }}"
            rows="20"
          ></textarea>
        </div>
      </div>
    } @else {
      <!-- Preview Mode -->
      <div class="preview-area">
        <h2 class="preview-title">{{ title() || t('admin.untitled') }}</h2>
        <div class="preview-content markdown-body">{{ content() }}</div>
      </div>
    }
  </div>
</div>
