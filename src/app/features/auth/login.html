<div class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <h1 class="auth-title">登录</h1>
      <p class="auth-subtitle">登录到 SpaceLab</p>

      @if (error()) {
        <div class="auth-error">
          {{ error() }}
        </div>
      }

      <form (ngSubmit)="onSubmit()" class="auth-form">
        <div class="form-field">
          <label class="form-label" for="email">邮箱</label>
          <input
            id="email"
            class="form-input"
            type="email"
            [value]="email()"
            (input)="email.set($any($event.target).value)"
            placeholder="your@email.com"
            required
          />
        </div>

        <div class="form-field">
          <label class="form-label" for="password">密码</label>
          <input
            id="password"
            class="form-input"
            type="password"
            [value]="password()"
            (input)="password.set($any($event.target).value)"
            placeholder="输入密码"
            required
          />
        </div>

        <button
          type="submit"
          class="auth-submit"
          [disabled]="loading()"
        >
          {{ loading() ? '登录中...' : '登录' }}
        </button>
      </form>

      <div class="auth-footer">
        <p>还没有账号？<a routerLink="/register">注册</a></p>
      </div>
    </div>
  </div>
</div>
