<div class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <!-- Google 风格 Logo -->
      <div class="auth-logo">
        <span class="auth-logo__icon">✦</span>
      </div>
      <h1 class="auth-title">登录</h1>
      <p class="auth-subtitle">使用您的 SpaceLab 账号</p>

      @if (error()) {
        <div class="auth-error">{{ error() }}</div>
      }

      <form (ngSubmit)="onSubmit()" class="auth-form">
        <div class="form-field">
          <input
            id="email"
            class="form-input"
            type="email"
            [value]="email()"
            (input)="email.set($any($event.target).value)"
            placeholder=" "
            required
          />
          <label class="form-label" for="email">邮箱</label>
        </div>

        <div class="form-field">
          <input
            id="password"
            class="form-input"
            type="password"
            [value]="password()"
            (input)="password.set($any($event.target).value)"
            placeholder=" "
            required
          />
          <label class="form-label" for="password">密码</label>
        </div>

        <button
          type="submit"
          class="auth-submit"
          [disabled]="loading()"
        >
          {{ loading() ? '登录中...' : '登录' }}
        </button>
      </form>

      <div class="auth-footer">
        <a routerLink="/register" class="auth-link">创建账号</a>
      </div>
    </div>
  </div>
</div>
