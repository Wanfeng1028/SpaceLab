<div class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <span class="auth-logo__icon">✦</span>
      </div>
      <h1 class="auth-title">注册</h1>
      <p class="auth-subtitle">创建您的 TesoroHome 账号</p>

      @if (error()) {
        <div class="auth-error">{{ error() }}</div>
      }

      <form (ngSubmit)="onSubmit()" class="auth-form">
        <div class="form-field">
          <input
            id="email"
            class="form-input"
            type="email"
            [value]="email()"
            (input)="email.set($any($event.target).value)"
            placeholder=" "
            required
          />
          <label class="form-label" for="email">邮箱</label>
        </div>

        <div class="form-field">
          <input
            id="username"
            class="form-input"
            type="text"
            [value]="username()"
            (input)="username.set($any($event.target).value)"
            placeholder=" "
            required
          />
          <label class="form-label" for="username">用户名</label>
        </div>

        <div class="form-field">
          <input
            id="password"
            class="form-input"
            type="password"
            [value]="password()"
            (input)="password.set($any($event.target).value)"
            placeholder=" "
            required
          />
          <label class="form-label" for="password">密码</label>
        </div>

        <div class="form-field">
          <input
            id="confirmPassword"
            class="form-input"
            type="password"
            [value]="confirmPassword()"
            (input)="confirmPassword.set($any($event.target).value)"
            placeholder=" "
            required
          />
          <label class="form-label" for="confirmPassword">确认密码</label>
        </div>

        <!-- 图形验证码 -->
        @if (captchaImageUrl()) {
          <div class="form-captcha">
            <img [src]="captchaImageUrl()" alt="验证码" (click)="!captchaLoading() && loadCaptcha()" title="点击刷新" [style.cursor]="captchaLoading() ? 'wait' : 'pointer'" [style.opacity]="captchaLoading() ? 0.5 : 1" />
            <input
              class="form-input form-captcha__input"
              type="text"
              [value]="captchaAnswer()"
              (input)="captchaAnswer.set($any($event.target).value)"
              placeholder="验证码"
              maxlength="6"
              autocomplete="off"
              required
            />
          </div>
        }

        <button
          type="submit"
          class="auth-submit"
          [disabled]="loading()"
        >
          {{ loading() ? '注册中...' : '注册' }}
        </button>
      </form>

      <!-- 第三方登录（暂未接入） -->
      <div class="auth-divider">
        <span class="auth-divider__line"></span>
        <span class="auth-divider__text">或使用第三方注册</span>
        <span class="auth-divider__line"></span>
      </div>

      <div class="auth-social">
        <button class="social-btn" type="button" (click)="showThirdPartyHint('Google')">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          <span>Google</span>
        </button>
        <button class="social-btn" type="button" (click)="showThirdPartyHint('GitHub')">
          <svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
          </svg>
          <span>GitHub</span>
        </button>
        <button class="social-btn" type="button" (click)="showThirdPartyHint('Microsoft')">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <rect x="1" y="1" width="10" height="10" fill="#F25022"/>
            <rect x="13" y="1" width="10" height="10" fill="#7FBA00"/>
            <rect x="1" y="13" width="10" height="10" fill="#00A4EF"/>
            <rect x="13" y="13" width="10" height="10" fill="#FFB900"/>
          </svg>
          <span>Microsoft</span>
        </button>
        <button class="social-btn" type="button" (click)="showThirdPartyHint('Apple')">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
            <path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
          </svg>
          <span>Apple</span>
        </button>
      </div>

      <div class="auth-footer">
        <a routerLink="/login" class="auth-link">已有账号？登录</a>
      </div>
    </div>
  </div>
</div>

<!-- 第三方登录弹窗 -->
@if (thirdPartyDialogVisible()) {
  <div class="auth-overlay" (click)="closeThirdPartyDialog()">
    <div class="auth-dialog" (click)="$event.stopPropagation()">
      <div class="auth-dialog__icon">🚧</div>
      <div class="auth-dialog__badge">{{ thirdPartyName() }}</div>
      <h3 class="auth-dialog__title">暂时没接入，后续开放</h3>
      <p class="auth-dialog__desc">{{ thirdPartyName() }} 注册功能正在开发中，敬请期待！</p>
      <div class="auth-dialog__actions">
        <button class="auth-dialog__btn" type="button" (click)="closeThirdPartyDialog()">知道了</button>
      </div>
    </div>
  </div>
}
