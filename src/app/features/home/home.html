<section class="eclipse-hero">
  <!-- Three.js 慢速漂移深空星轨粒子背景 (已内置并保留) -->
  <app-three-canvas [sceneFactory]="sceneFactory" class="backdrop-stars" />

  <!-- 电影画质细腻胶片微粒噪点遮罩层 -->
  <div class="grain-overlay"></div>

  <!-- 顶部极简双翼导航 + 中央圆形头像 -->
  <header class="minimal-header">
    <a routerLink="/about" class="nav-link">About</a>
    <div class="header-avatar">
      <!-- 带有加载失败降级机制的头像 -->
      <img 
        src="assets/avatar.jpg" 
        alt="Profile" 
        class="avatar-img" 
        #avatarImg
        (error)="avatarImg.style.display = 'none'; fallbackAvatar.style.display = 'flex'" 
      />
      <div class="avatar-fallback" #fallbackAvatar style="display: none;">
        <span>G</span>
      </div>
    </div>
    <a routerLink="/projects" class="nav-link">Projects</a>
  </header>

  <!-- 黑曜石日食星体 (Conic-Radial Eclipse Flare & Mask) -->
  <div class="eclipse-container">
    <div class="eclipse-flare yellow-orange"></div>
    <div class="eclipse-flare blue-purple"></div>
    <div class="eclipse-mask"></div>
  </div>

  <!-- 中央核心文字与 CTA 交互 -->
  <div class="hero-content">
    <h1 class="hero-title">Workflow changed.<br>Taste didn't.</h1>
    <p class="hero-subtitle">Designing with systems, code and AI</p>
    
    <div class="cta-container">
      <button class="pill-cta-button" (click)="onEnter()">
        Let's build something
      </button>
      <a class="subtext-link" (click)="onContact()">Have a project?</a>
    </div>
  </div>

  <!-- 底部极简居中版权声明 -->
  <footer class="minimal-footer">
    Vibed by Gruev — 2026
  </footer>
</section>
