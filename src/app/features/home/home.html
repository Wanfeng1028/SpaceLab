<div class="home-container">
  <!-- 第 1 屏：LANDING (完全保留现有设计，不动) -->
  <section class="eclipse-hero" id="section-landing" data-section="0">
    <!-- 动态视频壁纸背景 -->
    <app-video-wallpaper />

    <!-- CSS 动画背景层 (stars / eclipse / glow) -->
    <div class="hero-background" aria-hidden="true">
      <div class="hero-grid"></div>
      <div class="hero-stars"></div>
      <div class="hero-eclipse"></div>
      <div class="hero-glow hero-glow--blue"></div>
      <div class="hero-glow hero-glow--purple"></div>
    </div>

    <!-- 电影画质细腻胶片微粒噪点遮罩层 -->
    <div class="grain-overlay" [style.opacity]="filmNoise() ? 0.055 : 0"></div>

    <!-- 纯 CSS 午夜星空 + 流星 + 月牙装饰层 -->
    <div class="uiverse-midnight-sky">
      <div class="sky-canvas">
        <div class="stars stars-1"></div>
        <div class="stars stars-2"></div>
        <div class="stars stars-3"></div>
        <div class="meteor m1"></div>
        <div class="meteor m2"></div>
        <div class="meteor m3"></div>
        <div class="moon"></div>
      </div>
    </div>

    <!-- 装饰性发光能量核心 -->
    <div class="energy-orb-wrapper">
      <div class="energy-orb"></div>
    </div>

    <!-- 中央核心文字与 CTA 交互 -->
    <div class="hero-content">
      <!-- 欢迎标语 -->
      <div class="hero-welcome-row">
        <p class="hero-welcome">{{ t('home.welcome') }}</p>
      </div>

      <!-- 打字机效果文本区 -->
      <h1 class="typewriter-container" [class.is-typing]="showTypewriterCursor()">
        <span class="typewriter-text">{{ typedText() }}</span>
        <span class="typewriter-cursor" aria-hidden="true"></span>
      </h1>

      <!-- 还原之前的精美双色玻璃质感按钮组 -->
      <div class="space-button-group hero__actions">
        <button
          class="space-button space-button--md space-button--blue"
          [class.space-button--eclipse-dark]="isBright()"
          (click)="onEnter()"
        >
          {{ t('home.enter') }}
        </button>
        <button
          class="space-button space-button--md space-button--white"
          [class.space-button--eclipse-dark]="isBright()"
          (click)="onContact()"
        >
          {{ t('home.contact') }}
        </button>
      </div>
    </div>

    <!-- SpaceX 发发射遥测 HUD 模块组 -->
    <section class="launch-showcase" aria-label="Space launch telemetry preview">
      <app-launch-telemetry-overlay />
    </section>

    <!-- 底部极简居中版权声明 -->
    <footer class="minimal-footer">
      <div>{{ t('home.copyright') }}</div>
    </footer>

    <!-- 滚动提示 -->
    <div class="scroll-indicator">
      <div class="scroll-indicator__mouse">
        <div class="scroll-indicator__wheel"></div>
      </div>
      <span class="scroll-indicator__text"></span>
    </div>

    <!-- 打字机音效开关 -->
    <div class="fx-block">
      <div class="toggle">
        <div>
          <input
            type="checkbox"
            id="sound-toggle"
            [checked]="soundEnabled()"
            (change)="soundEnabled.set($any($event.target).checked)"
            aria-label="Toggle typewriter sound effects"
          />
          <label for="sound-toggle" data-unchecked="On" data-checked="Off"></label>
        </div>
      </div>
    </div>

    <!-- Launch Terminal Transition -->
    @if (isLaunchTransitionActive()) {
      <app-launch-terminal-transition (completed)="onLaunchComplete()" />
    }
  </section>

  <!-- 第 2 屏：COCKPIT DASHBOARD (驾驶舱总控台) -->
  <section class="cockpit-dashboard-section" id="section-cockpit" data-section="1">
    <app-cockpit-dashboard />
  </section>

  <!-- NEXT ORBIT CARD (下一轨道卡片) -->
  <section class="next-orbit-card-section" id="section-next-orbit" data-section="2">
    <app-home-next-orbit-card />
  </section>

  <!-- 联系弹窗 (Mac 终端风格) -->
  @if (showContactModal()) {
    <app-mac-terminal-modal
      size="sm"
      title="contact @spacelab: ~/info"
      (closed)="showContactModal.set(false)"
    >
      <div class="terminal-prompt">$</div>
      <div class="terminal-command" style="margin-bottom: 16px">cat contact-info.txt</div>

      <div class="terminal-output terminal-ok">
        <span class="terminal-ok">[OK]</span> {{ t('home.contactLoaded') }}
      </div>
      <div style="height: 12px"></div>

      <div style="font-size: 14px; line-height: 2">
        <div>📧 service.ai@outlook.com</div>
        <div>💻 GitHub — Wanfeng1028</div>
      </div>

      <div
        style="margin-top: 20px; padding-top: 16px; border-top: 1px solid rgba(255, 255, 255, 0.1)"
      >
        <span class="terminal-prompt">$</span>
        <span class="terminal-cursor"></span>
      </div>
    </app-mac-terminal-modal>
  }
</div>
