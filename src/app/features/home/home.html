<section class="eclipse-hero">

  <!-- 电影画质细腻胶片微粒噪点遮罩层 -->
  <div class="grain-overlay"></div>

  <!-- 顶部极简双翼导航 + 中央圆形头像 -->
  <header class="minimal-header">
    <a routerLink="/about" class="nav-link">About</a>
    <div class="header-avatar">
      <!-- 带有加载失败降级机制的头像 -->
      <img 
        src="assets/avatar.jpg" 
        alt="Profile" 
        class="avatar-img" 
        #avatarImg
        (error)="avatarImg.style.display = 'none'; fallbackAvatar.style.display = 'flex'" 
      />
      <div class="avatar-fallback" #fallbackAvatar style="display: none;">
        <span>G</span>
      </div>
    </div>
    <a routerLink="/projects" class="nav-link">Projects</a>
  </header>

  <!-- WebGL 大气物理散射日食画布组件 -->
  <app-three-canvas [sceneFactory]="sceneFactory" class="backdrop-stars" />

  <!-- 中央核心文字与 CTA 交互 -->
  <div class="hero-content">
    <!-- 打字机效果文本区 -->
    <h1 class="typewriter-container">
      <span class="typewriter-text">{{ typedText() }}</span>
      <span class="typewriter-cursor"></span>
    </h1>
    
    <!-- 还原用户之前的精美双色玻璃质感按钮组 -->
    <div class="space-button-group hero__actions">
      <button class="space-button space-button--md space-button--blue" (click)="onEnter()">
        {{ t('home.enter') }}
      </button>
      <button class="space-button space-button--md space-button--white" (click)="onContact()">
        {{ t('home.contact') }}
      </button>
    </div>
  </div>

  <!-- SpaceX 发射遥测 HUD 展示 -->
  <section class="launch-showcase" aria-label="Space launch telemetry preview">
    <app-launch-telemetry-overlay />
  </section>

  <!-- 底部极简居中版权声明与音效激活提示 -->
  <footer class="minimal-footer">
    <div>Vibed by Gruev — 2026</div>
    @if (audioCtxSuspended()) {
      <div class="audio-tip">🔊 Click anywhere to enable typewriter mechanical sounds</div>
    }
  </footer>
</section>
