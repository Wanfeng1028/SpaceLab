<div class="home-container">

  <!-- 第 1 屏：LANDING (完全保留现有设计，不动) -->
  <section class="eclipse-hero" id="section-landing" data-section="0">
    <!-- 电影画质细腻胶片微粒噪点遮罩层 -->
    <div class="grain-overlay" [style.opacity]="filmNoise() ? 0.055 : 0"></div>

    <!-- 纯 CSS 午夜星空 + 流星 + 月牙装饰层 -->
    <div class="uiverse-midnight-sky">
      <div class="sky-canvas">
        <div class="stars stars-1"></div>
        <div class="stars stars-2"></div>
        <div class="stars stars-3"></div>
        <div class="meteor m1"></div>
        <div class="meteor m2"></div>
        <div class="meteor m3"></div>
        <div class="moon"></div>
      </div>
    </div>

    <!-- WebGL 大气物理散射日食画布组件 -->
    <app-three-canvas [sceneFactory]="sceneFactory" class="backdrop-stars" />

    <!-- 装饰性发光能量核心 (uiverse: andrew-manzyk/young-walrus-64) -->
    <div class="energy-orb-wrapper">
      <div class="loader">
        <svg width="100" height="100" viewBox="0 0 100 100">
          <defs>
            <mask id="orb-clipping">
              <polygon points="0,0 100,0 100,100 0,100" fill="black"></polygon>
              <polygon points="25,25 75,25 50,75" fill="white"></polygon>
              <polygon points="50,25 75,75 25,75" fill="white"></polygon>
              <polygon points="35,35 65,35 50,65" fill="white"></polygon>
            </mask>
          </defs>
        </svg>
        <div class="orb-box"></div>
      </div>
    </div>

    <!-- 中央核心文字与 CTA 交互 -->
    <div class="hero-content">
      <!-- 欢迎标语 -->
      <div class="hero-welcome-row">
        <p class="hero-welcome">Welcome to SpaceLab</p>
      </div>

      <!-- 打字机效果文本区 -->
      <h1 class="typewriter-container">
        <span class="typewriter-text">{{ typedText() }}</span>
        <span class="typewriter-cursor"></span>
      </h1>

      <!-- 还原之前的精美双色玻璃质感按钮组 -->
      <div class="space-button-group hero__actions">
        <button class="space-button space-button--md space-button--blue"
          [class.space-button--eclipse-dark]="isBright()"
          (click)="onEnter()">
          {{ t('home.enter') }}
        </button>
        <button class="space-button space-button--md space-button--white"
          [class.space-button--eclipse-dark]="isBright()"
          (click)="onContact()">
          {{ t('home.contact') }}
        </button>
      </div>
    </div>

    <!-- SpaceX 发发射遥测 HUD 模块组 -->
    <section class="launch-showcase" aria-label="Space launch telemetry preview">
      <app-launch-telemetry-overlay />
    </section>

    <!-- 底部极简居中版权声明 -->
    <footer class="minimal-footer">
      <div>@Wanfeng2026</div>
    </footer>


    <!-- 滚动提示 -->
    <div class="scroll-indicator">
      <div class="scroll-indicator__mouse">
        <div class="scroll-indicator__wheel"></div>
      </div>
      <span class="scroll-indicator__text">SCROLL TO EXPLORE</span>
    </div>
  </section>

  <!-- 第 2 屏：EARTH OBSERVATORY (地球科学与遥感) -->
  <section class="earth-observatory-section" id="section-earth" data-section="1">
    <app-earth-observatory />
  </section>

  <!-- 第 3 屏：NEURAL CORE (人工智能/机器学习/大语言模型) -->
  <section class="neural-core-section" id="section-neural" data-section="2">
    <app-neural-core />
  </section>

  <!-- 第 4 屏：VISUAL SYSTEMS (创意编程与数据可视化) -->
  <section class="visual-systems-section" id="section-visual" data-section="3">
    <app-visual-systems />
  </section>

  <!-- 第 5 屏：ORBITAL LEARNING (STEM/科学学习与探索) -->
  <section class="orbital-learning-section" id="section-orbital" data-section="4">
    <app-orbital-learning />
  </section>

  <!-- 第 6 屏：COCKPIT DASHBOARD (驾驶舱总控台) -->
  <section class="cockpit-dashboard-section" id="section-cockpit" data-section="5">
    <app-cockpit-dashboard />
  </section>

  <!-- 联系弹窗 -->
  @if (showContactModal()) {
    <space-glass-modal size="md" (closed)="showContactModal.set(false)">
      <div class="contact-modal-content">
        <h3 class="contact-modal-title">{{ t('home.contactTitle') }}</h3>
        <p class="contact-modal-desc">{{ t('home.contactDesc') }}</p>
        <ul class="contact-modal-list">
          <li>service.ai@outlook.com</li>
          <li>GitHub — Wanfeng1028</li>
        </ul>
      </div>
    </space-glass-modal>
  }

</div>
