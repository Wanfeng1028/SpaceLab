<!-- ============================================= -->
<!-- Hero 首屏 — 太空光场 + 欢迎 + 按钮             -->
<!-- ============================================= -->
<section class="hero">
  <!-- Three.js 光场背景 -->
  @if (showScene) {
    <app-three-canvas [sceneFactory]="sceneFactory" />
  }

  <!-- CSS 光斑层 -->
  <div class="hero__glows">
    <div class="glow glow--1"></div>
    <div class="glow glow--2"></div>
    <div class="glow glow--3"></div>
  </div>

  <!-- 加载过渡 -->
  @if (phase() === 'loading') {
    <div class="hero__loader">
      <div class="loader-dot"></div>
    </div>
  }

  <!-- 中央文案 + 按钮 -->
  <div class="hero__center" [class.is-visible]="showText">
    <h1 class="hero__title" [class.is-visible]="showText">
      {{ t('home.welcome') }}
    </h1>
    <div class="hero__actions" [class.is-visible]="showButtons">
      <button class="space-glass-button space-glass-button--blue" (click)="onEnter()">
        {{ t('home.enter') }}
      </button>
      <button class="space-glass-button" (click)="onContact()">
        {{ t('home.contact') }}
      </button>
    </div>
  </div>

  <!-- 向下滚动提示 -->
  <div class="hero__scroll-hint" [class.is-visible]="showButtons">
    <div class="scroll-line"></div>
  </div>
</section>

<!-- ============================================= -->
<!-- 3D Portal — 玻璃传送门 + 四个入口               -->
<!-- ============================================= -->
<section id="portal" class="portal-section">
  <!-- 光场背景 -->
  <div class="portal-bg">
    <div class="portal-bg__glow"></div>
  </div>

  <!-- 传送门 -->
  <div class="portal">
    <!-- 发光圆环 -->
    <div class="portal__ring">
      <div class="portal__ring-inner"></div>
      <div class="portal__ring-glow"></div>
    </div>

    <!-- 四个入口节点 -->
    <div class="portal__nodes">
      @for (node of portalNodes; track node.label) {
        <a class="portal-node" [routerLink]="node.route">
          <div class="portal-node__orb"></div>
          <span class="portal-node__label">{{ node.label }}</span>
          <span class="portal-node__subtitle">{{ node.subtitle }}</span>
        </a>
      }
    </div>
  </div>
</section>

<!-- ============================================= -->
<!-- Contact                                        -->
<!-- ============================================= -->
<section id="contact" class="contact-section">
  <div class="contact-card">
    <h2 class="contact-card__title">{{ t('home.contactTitle') }}</h2>
    <p class="contact-card__desc">{{ t('home.contactDesc') }}</p>
    <div class="contact-card__links">
      <a class="contact-pill" href="mailto:hello@spacelab.dev">
        <span class="contact-pill__dot"></span>
        <span>Email</span>
      </a>
      <a class="contact-pill" href="https://github.com/Wanfeng1028" target="_blank" rel="noopener">
        <span class="contact-pill__dot"></span>
        <span>GitHub</span>
      </a>
    </div>
  </div>
</section>
