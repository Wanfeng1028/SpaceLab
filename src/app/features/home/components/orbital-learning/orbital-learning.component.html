<div class="orbital-learning">
  <!-- 左侧标题 -->
  <div class="orbital-header">
    <h1 class="orbital-number">05</h1>
    <h2 class="orbital-title">KNOWLEDGE ORBIT</h2>
    <p class="orbital-subtitle">STEM exploration through science, code and imagination.</p>
    <p class="orbital-desc">
      Mapping ideas as a living constellation.
    </p>
  </div>

  <!-- Three.js 知识星图画布 -->
  <div class="orbital-canvas-container">
    <app-three-canvas [sceneFactory]="orbitalFactory" />
  </div>

  <!-- 右侧领域标签 -->
  <div class="orbital-right">
    <div class="stem-labels">
      @for (label of stemLabels; track label) {
        <div class="stem-label">{{ label }}</div>
      }
    </div>
  </div>

  <!-- 底部状态栏 -->
  <app-telemetry-bar
    [text]="'KNOWLEDGE MAP · STEM ORBIT · SIGNAL LINKED · READY FOR PORTAL'"
    status="online" />
</div>
