<div class="orbital-learning">
  <!-- 左侧标题 -->
  <div class="orbital-header">
    <h1 class="orbital-number">05</h1>
    <h2 class="orbital-title">{{ t('orbitalLearning.title') }}</h2>
    <p class="orbital-subtitle">{{ t('orbitalLearning.subtitle') }}</p>
    <p class="orbital-desc">{{ t('orbitalLearning.desc') }}</p>
  </div>

  <!-- Three.js 知识星图画布 -->
  <div class="orbital-canvas-container">
    <app-three-canvas [sceneFactory]="orbitalFactory" />
  </div>

  <!-- 右侧领域标签 -->
  <div class="orbital-right">
    <div class="stem-labels">
      @for (label of stemLabels; track label) {
        <div class="stem-label">{{ t('orbitalLearning.' + label.toLowerCase()) }}</div>
      }
    </div>
  </div>

  <!-- 底部状态栏 -->
  <app-telemetry-bar [text]="t('orbitalLearning.telemetryOnline')" status="online" />
</div>
