<div class="dock-section">
  <div class="dock-header">
    <p class="dock-telemetry">{{ t('homeResourceDock.telemetry') }}</p>
    <h2 class="dock-title">{{ t('homeResourceDock.title') }}</h2>
    <p class="dock-subtitle">{{ t('homeResourceDock.subtitle') }}</p>
  </div>

  <div class="dock-cards">
    @for (card of cards; track card.key) {
      <a [routerLink]="card.route" class="dock-card">
        <span class="dock-card__icon">{{ card.icon }}</span>
        <h3 class="dock-card__title">{{ t('homeResourceDock.' + card.key) }}</h3>
        <p class="dock-card__desc">{{ t('homeResourceDock.' + card.key + 'Desc') }}</p>
        <span class="dock-card__arrow">→</span>
      </a>
    }
  </div>
</div>
