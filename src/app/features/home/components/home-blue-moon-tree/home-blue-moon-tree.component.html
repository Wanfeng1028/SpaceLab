<div class="blue-moon-tree">
  <!-- Three.js 粒子树画布 -->
  <app-three-canvas [sceneFactory]="sceneFactory" />

  <!-- 标题叠加层 -->
  <div class="tree-overlay">
    <div class="tree-header">
      <p class="tree-telemetry">{{ t('homeBlueMoonTree.telemetry') }}</p>
      <h2 class="tree-title">{{ t('homeBlueMoonTree.title') }}</h2>
      <p class="tree-subtitle">{{ t('homeBlueMoonTree.subtitle') }}</p>
      <p class="tree-desc">{{ t('homeBlueMoonTree.desc') }}</p>
    </div>
  </div>
</div>
