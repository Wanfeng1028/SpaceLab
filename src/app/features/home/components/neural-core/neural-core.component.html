<div class="neural-core">
  <!-- 左侧竖排标题 -->
  <div class="neural-header">
    <h1 class="neural-number">03</h1>
    <h2 class="neural-title">NEURAL CORE</h2>
    <p class="neural-subtitle">Artificial intelligence, machine learning and language models.</p>
    <p class="neural-desc">Exploring models that learn, reason and generate.</p>
  </div>

  <!-- Three.js 神经网络画布 -->
  <div class="neural-canvas-container">
    <app-three-canvas [sceneFactory]="neuralFactory" />
  </div>

  <!-- 右侧推理状态 HUD -->
  <div class="neural-right">
    <app-hud-frame class="inference-hud">
      <div class="hud-metrics">
        <app-hud-metric label="MODEL" value="LANGUAGE" />
        <app-hud-metric label="TOKENS" value="STREAMING" />
        <app-hud-metric label="ATTENTION" value="ACTIVE" />
        <app-hud-metric label="INFERENCE" value="STABLE" />
      </div>
    </app-hud-frame>
  </div>

  <!-- 底部状态栏 -->
  <app-telemetry-bar
    [text]="'MACHINE LEARNING · LLM · EMBEDDING SPACE · NEURAL SIGNAL ONLINE'"
    status="online"
  />
</div>
