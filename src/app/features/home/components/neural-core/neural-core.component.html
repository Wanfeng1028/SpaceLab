<div class="neural-core">
  <!-- 左侧竖排标题 -->
  <div class="neural-header">
    <h1 class="neural-number">03</h1>
    <h2 class="neural-title">{{ t('neuralCore.title') }}</h2>
    <p class="neural-subtitle">{{ t('neuralCore.subtitle') }}</p>
    <p class="neural-desc">{{ t('neuralCore.desc') }}</p>
  </div>

  <!-- Three.js 神经网络画布 -->
  <div class="neural-canvas-container">
    <app-three-canvas [sceneFactory]="neuralFactory" />
  </div>

  <!-- 右侧推理状态 HUD -->
  <div class="neural-right">
    <app-hud-frame class="inference-hud">
      <div class="hud-metrics">
        <app-hud-metric [label]="t('neuralCore.model')" [value]="t('neuralCore.modelVal')" />
        <app-hud-metric [label]="t('neuralCore.tokens')" [value]="t('neuralCore.tokensVal')" />
        <app-hud-metric
          [label]="t('neuralCore.attention')"
          [value]="t('neuralCore.attentionVal')"
        />
        <app-hud-metric
          [label]="t('neuralCore.inference')"
          [value]="t('neuralCore.inferenceVal')"
        />
      </div>
    </app-hud-frame>
  </div>

  <!-- 底部状态栏 -->
  <app-telemetry-bar [text]="t('neuralCore.telemetryOnline')" status="online" />
</div>
