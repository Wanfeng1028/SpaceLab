<div class="earth-observatory">
  <!-- 左上标题区域 -->
  <div class="observatory-header">
    <h1 class="observatory-number">02</h1>
    <h2 class="observatory-title">EARTH OBSERVATORY</h2>
    <p class="observatory-subtitle">Remote sensing the living planet.</p>
    <p class="observatory-desc">
      Observing terrain, vegetation and atmosphere through spatial data.
    </p>
  </div>

  <!-- Three.js 地球画布 -->
  <div class="earth-canvas-container">
    <app-three-canvas [sceneFactory]="earthFactory" />
  </div>

  <!-- 左侧HUD面板 -->
  <div class="observatory-left">
    <!-- 遥感参数 HUD -->
    <app-hud-frame class="sensor-hud">
      <div class="hud-metrics">
        <app-hud-metric label="SENSOR" value="MULTISPECTRAL" />
        <app-hud-metric label="RESOLUTION" value="0.025 m" />
        <app-hud-metric label="ORBIT" value="POLAR" />
        <app-hud-metric label="SCAN MODE" value="ACTIVE" />
      </div>
    </app-hud-frame>
  </div>

  <!-- 右侧垂直扫描标尺 + 频谱条 -->
  <div class="observatory-right">
    <!-- 垂直扫描标尺 -->
    <div class="scan-scale">
      @for (tick of scaleTicks; track tick.value) {
        <div class="scale-tick" [class.scale-tick--major]="tick.major">
          <span class="tick-label">{{ tick.value }}°</span>
        </div>
      }
    </div>

    <!-- 频谱条 -->
    <div class="spectrum-bars">
      <div class="spectrum-bar" style="--bar-height: 60%; --bar-color: #69d7ff;"></div>
      <div class="spectrum-bar" style="--bar-height: 80%; --bar-color: #56f0c2;"></div>
      <div class="spectrum-bar" style="--bar-height: 45%; --bar-color: #8f7cff;"></div>
      <div class="spectrum-bar" style="--bar-height: 90%; --bar-color: #69d7ff;"></div>
      <div class="spectrum-bar" style="--bar-height: 55%; --bar-color: #56f0c2;"></div>
    </div>
  </div>

  <!-- 底部遥感数据状态栏 -->
  <app-telemetry-bar
    [text]="'LANDSAT STREAM · UAV ORTHOIMAGE · NDVI GRID · TERRAIN SIGNAL ONLINE'"
    status="online" />
</div>
