<section class="space-section" id="portal-gallery">
  <!-- WebGL 3D Layer -->
  <div class="webgl-layer">
    <app-three-canvas [sceneFactory]="stargateFactory" />
  </div>

  <!-- HUD Overlay Layer -->
  <div class="hud-layer">
    <!-- Centered Title + Subtitle + Buttons -->
    <div class="portal-content">
      <span class="portal-content__number">06</span>
      <h2 class="portal-content__title">AI<br />Frontline</h2>
      <p class="portal-content__subtitle">
        {{ t('portal.aiFrontlineDesc') }}
      </p>

      <div class="portal-buttons">
        <app-magnetic-button (clicked)="onEnter()">
          {{ t('common.more') }}
        </app-magnetic-button>
        <app-magnetic-button (clicked)="onExplore()">
          Explore Projects
        </app-magnetic-button>
        <app-magnetic-button (clicked)="onReturnTop()">
          Return to Top
        </app-magnetic-button>
      </div>
    </div>

    <!-- Footer Copyright -->
    <div class="portal-footer-row">
      <span class="portal-copyright">
        &copy; {{ currentYear }} SpaceLab. All rights reserved.
      </span>
      <span class="portal-coordinates">
        LAT 0.000 &middot; LON 0.000 &middot; ALT 36,000 km
      </span>
    </div>

    <!-- Telemetry Bar -->
    <div class="portal-footer">
      <app-telemetry-bar [text]="telemetryText()" />
    </div>
  </div>
</section>
