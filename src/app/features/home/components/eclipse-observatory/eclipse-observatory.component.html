<section class="space-section" id="eclipse-observatory">
  <!-- WebGL 3D Layer -->
  <div class="webgl-layer">
    <app-three-canvas [sceneFactory]="eclipseFactory" />
  </div>

  <!-- HUD Overlay Layer -->
  <div class="hud-layer">
    <!-- Header (top-left) -->
    <div class="eclipse-header">
      <span class="eclipse-header__number">02</span>
      <h2 class="eclipse-header__title" [innerHTML]="t('eclipseObservatory.title')"></h2>
      <p class="eclipse-header__subtitle">{{ t('eclipseObservatory.subtitle') }}</p>
    </div>

    <!-- Left Metrics Panel -->
    <div class="eclipse-metrics">
      <app-hud-frame>
        <app-hud-metric
          [label]="t('eclipseObservatory.coronaTemp')"
          value="1.5M K"
          color="var(--space-cyan)"
          [animated]="true"
        />
        <app-hud-metric [label]="t('eclipseObservatory.umbraRadius')" value="2,684 km" />
        <app-hud-metric [label]="t('eclipseObservatory.shadowSpeed')" value="3,400 km/h" />
        <app-hud-metric [label]="t('eclipseObservatory.duration')" value="4m 33s" />
        <app-hud-metric [label]="t('eclipseObservatory.sarosCycle')" value="136" />
      </app-hud-frame>
    </div>

    <!-- Right Scale Ticks -->
    <div class="eclipse-scale">
      @for (tick of scaleTicks; track tick.value) {
        <div class="eclipse-scale__tick" [class.eclipse-scale__tick--major]="tick.major">
          <span class="eclipse-scale__bar"></span>
          @if (tick.major) {
            <span class="eclipse-scale__label">{{ tick.value }}&deg;</span>
          }
        </div>
      }
    </div>

    <!-- Bottom Telemetry Bar -->
    <div class="eclipse-footer">
      <app-telemetry-bar [text]="telemetryText()" />
    </div>
  </div>
</section>
