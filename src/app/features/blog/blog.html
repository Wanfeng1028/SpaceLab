<div class="blog-page">
  <!-- Hero -->
  <section class="blog-hero">
    <p class="blog-kicker">BLOG</p>
    <h1 class="blog-hero__title">{{ t('blog.title') }}</h1>
    <p class="blog-hero__desc">{{ t('blog.heroDesc') }}</p>
  </section>

  <!-- Search -->
  <section class="blog-search-section">
    <app-search-box
      [placeholder]="t('blog.searchPlaceholder')"
      [value]="searchQuery()"
      (valueChange)="searchQuery.set($event)"
      (search)="searchQuery.set($event)"
    />
  </section>

  <!-- Category Filters -->
  <section class="blog-filter-section">
    @for (cat of categories(); track cat) {
      <button
        class="filter-chip"
        [class.is-active]="selectedCategory() === cat"
        [attr.aria-pressed]="selectedCategory() === cat"
        (click)="selectCategory(cat)"
      >
        {{ cat === 'all' ? t('common.all') : cat }}
      </button>
    }
  </section>

  <!-- Article List -->
  @if (filteredPosts().length > 0) {
    <section class="blog-list">
      @for (post of filteredPosts(); track post.slug) {
        <app-article-card
          [title]="post.title"
          [slug]="post.slug"
          [excerpt]="post.summary"
          [date]="post.date"
          [tags]="post.tags"
          [category]="post.category"
          [readingTime]="post.readingTime"
        />
      }
    </section>
  } @else {
    <div class="blog-empty">
      <span class="blog-empty__icon">📭</span>
      <p>{{ t('blog.noArticles') }}</p>
    </div>
  }

  <!-- Subscribe -->
  <section class="blog-subscribe">
    <div class="blog-subscribe__card">
      <h2 class="blog-subscribe__title">{{ t('blog.subscribeTitle') }}</h2>
      <p class="blog-subscribe__desc">{{ t('blog.subscribeDesc') }}</p>
      <div class="blog-subscribe__form">
        <input
          class="blog-subscribe__input"
          type="email"
          [placeholder]="t('blog.subscribePlaceholder')"
        />
        <button class="space-button space-button--blue space-button--sm" (click)="onSubscribe()">
          {{ t('blog.subscribeBtn') }}
        </button>
      </div>
    </div>
  </section>
</div>
