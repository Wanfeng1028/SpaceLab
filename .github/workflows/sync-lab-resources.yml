name: Sync Lab AI Resources

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Force sync even if no changes detected'
        required: false
        default: 'false'
        type: boolean

  schedule:
    - cron: '21 1 * * *'
    - cron: '21 7 * * *'
    - cron: '21 13 * * *'
    - cron: '21 19 * * *'

concurrency:
  group: sync-lab-resources
  cancel-in-progress: true

jobs:
  sync:
    name: Sync Lab Resources
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync lab resources
        id: sync
        run: node scripts/sync-lab-resources.mjs
        env:
          GITHUB_OUTPUT: ${{ github.output }}

      - name: Check for changes
        id: changes
        run: |
          if [ "${{ steps.sync.outputs.changed }}" = "true" ] || [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/lab/
          git commit -m "chore: sync lab ai resources"
          git push

      - name: Summary
        run: |
          if [ "${{ steps.changes.outputs.has_changes }}" = "true" ]; then
            echo "✅ Lab AI resources updated and committed" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No lab resource updates" >> $GITHUB_STEP_SUMMARY
          fi
