name: Sync GitHub Projects

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      force:
        description: 'Force sync even if no changes detected'
        required: false
        default: 'false'
        type: boolean

  # Scheduled - once daily at 18:23 UTC (02:23 CST next day)
  schedule:
    - cron: '23 18 * * *'

# Allow only one run at a time
concurrency:
  group: sync-github-projects
  cancel-in-progress: true

jobs:
  sync:
    name: Sync Projects
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync GitHub projects
        id: sync
        run: node scripts/sync-github-projects.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OUTPUT: ${{ github.output }}

      - name: Check for changes
        id: changes
        run: |
          if [ "${{ steps.sync.outputs.changed }}" = "true" ] || [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/projects/
          git commit -m "chore: sync github projects"
          # Rebase again in case remote advanced while syncing
          git pull --rebase origin main
          git push

      - name: Summary
        run: |
          if [ "${{ steps.changes.outputs.has_changes }}" = "true" ]; then
            echo "✅ Projects list updated and committed" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No changes detected" >> $GITHUB_STEP_SUMMARY
          fi
