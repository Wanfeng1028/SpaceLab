name: Daily Stats Log

on:
  schedule:
    # 每天 UTC 00:00 运行 (北京时间 08:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  log-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # 先运行内容构建脚本，确保 content.generated.ts 是最新的
      - run: node scripts/build-content.mjs

      # 运行统计生成脚本
      - run: node scripts/generate-daily-stats.mjs

      # 提交更新后的日志文件
      - name: Commit daily stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/daily-log.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 daily stats: $(date +%Y-%m-%d)"
            git push
          fi
